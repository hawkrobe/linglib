baseURL = "https://linglib.io/"
languageCode = "en-us"
title = "Linglib"
theme = "PaperMod"

# Most files under data/ are not Hugo data sources — references.bib is consumed
# by scripts/gen_bibliography.py, the audit notes are workflow artifacts, and
# zotero.py is tooling. Hugo only needs the .toml files.
ignoreFiles = ['\.py~?$', '\.bib$', '/data/audit.*\.md$', '/data/AUDIT_.*\.md$']

[params]
  description = "A community library for formal linguistics in Lean 4."
  author = "Robert Hawkins"
  ShowReadingTime = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  defaultTheme = "auto"

[[params.socialIcons]]
  name = "github"
  url = "https://github.com/hawkrobe/linglib"

[menu]
  [[menu.main]]
    name = "Blog"
    url = "/posts/"
    weight = 10
  [[menu.main]]
    name = "Map"
    url = "/map/"
    weight = 15
  [[menu.main]]
    name = "Wishlist"
    url = "/wishlist/"
    weight = 18
  [[menu.main]]
    name = "Roadmap"
    url = "/roadmap/"
    weight = 20
  [[menu.main]]
    name = "Bibliography"
    url = "/bibliography/"
    weight = 30
  [[menu.main]]
    name = "API Docs"
    url = "/docs/"
    weight = 40

[markup.goldmark.renderer]
  unsafe = true

[outputs]
  home = ["HTML", "RSS"]
