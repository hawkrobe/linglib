<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340" font-family="'IBM Plex Sans', 'Helvetica Neue', sans-serif">
  <!-- Background -->
  <rect width="720" height="340" fill="#fafaf9" rx="8"/>

  <!-- Title -->
  <text x="360" y="28" text-anchor="middle" font-size="15" font-weight="600" fill="#1c1917">"John said Mary was sick" — Two Readings</text>

  <!-- ===== TOP: Shifted Reading ===== -->
  <text x="60" y="62" font-size="13" font-weight="700" fill="#1e40af">Shifted reading</text>
  <text x="60" y="78" font-size="11" fill="#3b82f6" font-style="italic">Mary was sick before the saying</text>

  <!-- Timeline -->
  <line x1="80" y1="120" x2="660" y2="120" stroke="#cbd5e1" stroke-width="2"/>

  <!-- Tick marks and labels -->
  <!-- E_sick at -5 -->
  <line x1="170" y1="110" x2="170" y2="130" stroke="#dc2626" stroke-width="2"/>
  <circle cx="170" cy="120" r="5" fill="#dc2626"/>
  <text x="170" y="100" text-anchor="middle" font-size="11" font-weight="600" fill="#dc2626">E</text>
  <text x="170" y="148" text-anchor="middle" font-size="9" fill="#dc2626">sick</text>

  <!-- E_say = P = R at -3 -->
  <line x1="330" y1="110" x2="330" y2="130" stroke="#2563eb" stroke-width="2"/>
  <circle cx="330" cy="120" r="5" fill="#2563eb"/>
  <text x="330" y="100" text-anchor="middle" font-size="11" font-weight="600" fill="#2563eb">P, R</text>
  <text x="330" y="148" text-anchor="middle" font-size="9" fill="#2563eb">said</text>

  <!-- S at 0 -->
  <line x1="580" y1="110" x2="580" y2="130" stroke="#16a34a" stroke-width="2"/>
  <circle cx="580" cy="120" r="5" fill="#16a34a"/>
  <text x="580" y="100" text-anchor="middle" font-size="11" font-weight="600" fill="#16a34a">S</text>
  <text x="580" y="148" text-anchor="middle" font-size="9" fill="#16a34a">now</text>

  <!-- Relation annotations -->
  <text x="250" y="90" text-anchor="middle" font-size="9" fill="#94a3b8">E &lt; P</text>
  <text x="455" y="90" text-anchor="middle" font-size="9" fill="#94a3b8">P &lt; S</text>

  <!-- Divider -->
  <line x1="40" y1="175" x2="680" y2="175" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- ===== BOTTOM: Simultaneous Reading ===== -->
  <text x="60" y="206" font-size="13" font-weight="700" fill="#d97706">Simultaneous reading</text>
  <text x="60" y="222" font-size="11" fill="#f59e0b" font-style="italic">Mary was sick at the time of the saying</text>

  <!-- Timeline -->
  <line x1="80" y1="264" x2="660" y2="264" stroke="#cbd5e1" stroke-width="2"/>

  <!-- E_sick = E_say = P = R at -3 (merged) -->
  <line x1="330" y1="254" x2="330" y2="274" stroke="#d97706" stroke-width="2"/>
  <circle cx="330" cy="264" r="7" fill="#d97706"/>
  <text x="330" y="244" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">E, P, R</text>
  <text x="330" y="292" text-anchor="middle" font-size="9" fill="#d97706">sick = said</text>

  <!-- S at 0 -->
  <line x1="580" y1="254" x2="580" y2="274" stroke="#16a34a" stroke-width="2"/>
  <circle cx="580" cy="264" r="5" fill="#16a34a"/>
  <text x="580" y="244" text-anchor="middle" font-size="11" font-weight="600" fill="#16a34a">S</text>
  <text x="580" y="292" text-anchor="middle" font-size="9" fill="#16a34a">now</text>

  <!-- Relation annotations -->
  <text x="330" y="232" text-anchor="middle" font-size="9" fill="#94a3b8">E = P = R</text>
  <text x="455" y="232" text-anchor="middle" font-size="9" fill="#94a3b8">P &lt; S</text>

  <!-- Bottom note -->
  <text x="360" y="330" text-anchor="middle" font-size="10" fill="#64748b">Five mechanisms — binding, deletion, zero tense, Agree, dedicated tense — all produce the same simultaneous frame.</text>
</svg>
