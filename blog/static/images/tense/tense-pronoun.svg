<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" font-family="'IBM Plex Sans', 'Helvetica Neue', sans-serif">
  <defs>
    <marker id="tp-arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="720" height="380" fill="#fafaf9" rx="8"/>

  <!-- Title -->
  <text x="360" y="28" text-anchor="middle" font-size="15" font-weight="600" fill="#1c1917">TensePronoun — Five Traditions in One Type</text>

  <!-- Central structure box -->
  <rect x="200" y="50" width="320" height="190" rx="10" fill="#f8fafc" stroke="#334155" stroke-width="2"/>
  <text x="360" y="76" text-anchor="middle" font-size="14" font-weight="700" fill="#1c1917" font-family="monospace">TensePronoun</text>

  <!-- Fields -->
  <rect x="220" y="90" width="280" height="28" rx="4" fill="#e2e8f0"/>
  <text x="232" y="109" font-size="12" font-weight="500" fill="#334155" font-family="monospace">varIndex : ℕ</text>

  <rect x="220" y="126" width="280" height="28" rx="4" fill="#dbeafe"/>
  <text x="232" y="145" font-size="12" font-weight="500" fill="#1e40af" font-family="monospace">constraint : GramTense</text>

  <rect x="220" y="162" width="280" height="28" rx="4" fill="#fef3c7"/>
  <text x="232" y="181" font-size="12" font-weight="500" fill="#92400e" font-family="monospace">mode : TenseInterpretation</text>

  <rect x="220" y="198" width="280" height="28" rx="4" fill="#f0fdf4"/>
  <text x="232" y="217" font-size="12" font-weight="500" fill="#166534" font-family="monospace">evalTimeIndex : ℕ</text>

  <!-- Tradition labels (left side) -->
  <!-- varIndex → Partee (1973) -->
  <rect x="20" y="90" width="140" height="28" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
  <text x="90" y="108" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">Partee (1973)</text>
  <line x1="160" y1="104" x2="215" y2="104" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#tp-arr)"/>
  <text x="90" y="132" text-anchor="middle" font-size="9" fill="#94a3b8">Temporal variables</text>

  <!-- constraint → Prior (1967) -->
  <rect x="20" y="155" width="140" height="28" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="90" y="173" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">Prior (1967)</text>
  <line x1="160" y1="169" x2="215" y2="145" stroke="#2563eb" stroke-width="1.5" marker-end="url(#tp-arr)"/>

  <!-- Tradition labels (right side) -->
  <!-- mode = .indexical → Kaplan -->
  <rect x="560" y="130" width="140" height="42" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="630" y="148" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">Kaplan</text>
  <text x="630" y="163" text-anchor="middle" font-size="9" fill="#d97706">mode = .indexical</text>
  <line x1="505" y1="176" x2="555" y2="160" stroke="#d97706" stroke-width="1.5" marker-end="url(#tp-arr)"/>

  <!-- mode = .bound → Ogihara (1989) -->
  <rect x="560" y="186" width="140" height="42" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="630" y="204" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">Ogihara (1989)</text>
  <text x="630" y="219" text-anchor="middle" font-size="9" fill="#d97706">mode = .bound</text>
  <line x1="505" y1="182" x2="555" y2="198" stroke="#d97706" stroke-width="1.5" marker-end="url(#tp-arr)"/>

  <!-- evalTimeIndex → Klecha (2016) -->
  <rect x="560" y="245" width="140" height="42" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1"/>
  <text x="630" y="263" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">Klecha (2016)</text>
  <text x="630" y="278" text-anchor="middle" font-size="9" fill="#22c55e">Modal eval shift</text>
  <line x1="505" y1="218" x2="555" y2="256" stroke="#16a34a" stroke-width="1.5" marker-end="url(#tp-arr)"/>

  <!-- Reichenbach note at bottom -->
  <rect x="100" y="260" width="440" height="44" rx="6" fill="#fdf4ff" stroke="#a855f7" stroke-width="1"/>
  <text x="320" y="280" text-anchor="middle" font-size="11" font-weight="600" fill="#7e22ce">Reichenbach (1947)</text>
  <text x="320" y="296" text-anchor="middle" font-size="10" fill="#a855f7">toFrame g → constructs S, P, R, E from the assignment</text>

  <!-- Bottom caption -->
  <rect x="60" y="320" width="600" height="44" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="360" y="340" text-anchor="middle" font-size="11" fill="#475569">One type projects onto five historical representations of temporal reference.</text>
  <text x="360" y="356" text-anchor="middle" font-size="11" fill="#475569">Each theory's mechanism maps to a field or field value of TensePronoun.</text>
</svg>
