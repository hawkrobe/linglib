<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" font-family="'IBM Plex Sans', 'Helvetica Neue', sans-serif">
  <!-- Background -->
  <rect width="720" height="320" fill="#fafaf9" rx="8"/>

  <!-- Title -->
  <text x="360" y="28" text-anchor="middle" font-size="15" font-weight="600" fill="#1c1917">Conservativity: Q(A, B) = Q(A, A ∩ B)</text>

  <!-- ===== LEFT: Conservative (natural language) ===== -->
  <text x="180" y="58" text-anchor="middle" font-size="13" font-weight="600" fill="#1e40af">Conservative (attested)</text>

  <!-- Circle A -->
  <circle cx="155" cy="160" r="70" fill="#dbeafe" fill-opacity="0.5" stroke="#2563eb" stroke-width="1.5"/>
  <text x="110" y="120" font-size="12" font-weight="600" fill="#1e40af">A</text>

  <!-- Circle B -->
  <circle cx="210" cy="160" r="70" fill="#fef3c7" fill-opacity="0.5" stroke="#d97706" stroke-width="1.5"/>
  <text x="260" y="120" font-size="12" font-weight="600" fill="#92400e">B</text>

  <!-- A ∩ B highlight -->
  <clipPath id="clipA"><circle cx="155" cy="160" r="70"/></clipPath>
  <circle cx="210" cy="160" r="70" fill="#16a34a" fill-opacity="0.35" clip-path="url(#clipA)"/>

  <!-- A ∩ B label -->
  <text x="182" y="165" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">A∩B</text>

  <!-- Caption -->
  <text x="180" y="252" text-anchor="middle" font-size="11" fill="#475569">Only the shaded region matters.</text>
  <text x="180" y="268" text-anchor="middle" font-size="10" fill="#64748b">"Every student passed" depends on</text>
  <text x="180" y="282" text-anchor="middle" font-size="10" fill="#64748b">students who passed, not non-students.</text>

  <!-- Divider -->
  <line x1="360" y1="50" x2="360" y2="300" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- ===== RIGHT: Non-conservative (unattested) ===== -->
  <text x="540" y="58" text-anchor="middle" font-size="13" font-weight="600" fill="#991b1b">Non-conservative (unattested)</text>

  <!-- Circle A' -->
  <circle cx="515" cy="160" r="70" fill="#fee2e2" fill-opacity="0.5" stroke="#dc2626" stroke-width="1.5"/>
  <text x="470" y="120" font-size="12" font-weight="600" fill="#991b1b">A</text>

  <!-- Circle B' -->
  <circle cx="570" cy="160" r="70" fill="#fef3c7" fill-opacity="0.5" stroke="#d97706" stroke-width="1.5"/>
  <text x="620" y="120" font-size="12" font-weight="600" fill="#92400e">B</text>

  <!-- Full shading of both (non-conservative needs all of A and B) -->
  <circle cx="515" cy="160" r="70" fill="#dc2626" fill-opacity="0.15"/>
  <circle cx="570" cy="160" r="70" fill="#dc2626" fill-opacity="0.15"/>

  <!-- Caption -->
  <text x="540" y="252" text-anchor="middle" font-size="11" fill="#475569">The whole of A and B both matter.</text>
  <text x="540" y="268" text-anchor="middle" font-size="10" fill="#64748b">"*Eveny student passed" ≝ |A| > |B|</text>
  <text x="540" y="282" text-anchor="middle" font-size="10" fill="#64748b">Logically possible but never attested.</text>

  <!-- Bottom note -->
  <text x="360" y="310" text-anchor="middle" font-size="10" fill="#94a3b8" font-style="italic">Barwise &amp; Cooper (1981): all natural language determiners are conservative.</text>
</svg>
