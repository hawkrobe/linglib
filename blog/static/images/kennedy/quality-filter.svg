<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 460" font-family="'IBM Plex Sans', 'Helvetica Neue', sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="760" height="460" fill="#fafaf9" rx="8"/>

  <!-- Title -->
  <text x="380" y="30" text-anchor="middle" font-size="15" font-weight="600" fill="#1c1917">Quality Filter as Interpretation Selector</text>

  <!-- ===== LEFT PANEL: FULL ACCESS ===== -->
  <rect x="20" y="50" width="350" height="390" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="195" y="76" text-anchor="middle" font-size="14" font-weight="700" fill="#166534">Full Access (a = 3)</text>
  <text x="195" y="94" text-anchor="middle" font-size="11" fill="#22c55e">Speaker knows the true world</text>

  <!-- Belief state -->
  <rect x="40" y="108" width="310" height="36" rx="5" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="195" y="130" text-anchor="middle" font-size="11" fill="#64748b">Speaker's belief state: {s2} (knows exactly 2)</text>

  <!-- Exact interpretation -->
  <rect x="40" y="158" width="310" height="70" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="55" y="178" font-size="11" font-weight="600" fill="#1e40af">Exact: "two" true iff count = 2</text>
  <text x="55" y="196" font-size="10" fill="#3b82f6">s2: count = 2 → true</text>
  <text x="55" y="212" font-size="10" fill="#3b82f6">All believed worlds satisfy "two"</text>
  <rect x="270" y="170" width="68" height="24" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="304" y="187" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">PASS</text>

  <!-- Lower-bound interpretation -->
  <rect x="40" y="240" width="310" height="70" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="55" y="260" font-size="11" font-weight="600" fill="#92400e">Lower-bound: "two" true iff count ≥ 2</text>
  <text x="55" y="278" font-size="10" fill="#d97706">s2: count ≥ 2 → true</text>
  <text x="55" y="294" font-size="10" fill="#d97706">All believed worlds satisfy "two"</text>
  <rect x="270" y="252" width="68" height="24" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="304" y="269" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">PASS</text>

  <!-- Result -->
  <rect x="40" y="325" width="310" height="58" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="195" y="347" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">Both pass → L1 selects the more informative</text>
  <text x="195" y="365" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">→ Exact reading: P(s2) = 14/17</text>

  <!-- Arrow showing selection -->
  <text x="195" y="405" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">Exact is stronger (rules out s3), so L1 prefers it</text>

  <!-- ===== RIGHT PANEL: PARTIAL ACCESS ===== -->
  <rect x="390" y="50" width="350" height="390" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="565" y="76" text-anchor="middle" font-size="14" font-weight="700" fill="#991b1b">Partial Access (a = 2)</text>
  <text x="565" y="94" text-anchor="middle" font-size="11" fill="#ef4444">Speaker has seen 2 of 3 objects</text>

  <!-- Belief state -->
  <rect x="410" y="108" width="310" height="36" rx="5" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="565" y="130" text-anchor="middle" font-size="11" fill="#64748b">Speaker's belief state: {s2, s3} (uncertain)</text>

  <!-- Exact interpretation — BLOCKED -->
  <rect x="410" y="158" width="310" height="70" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="425" y="178" font-size="11" font-weight="600" fill="#991b1b">Exact: "two" true iff count = 2</text>
  <text x="425" y="196" font-size="10" fill="#dc2626">s3: count = 2 → false</text>
  <text x="425" y="212" font-size="10" fill="#dc2626">ln(0) = −∞ → utility = −∞</text>
  <rect x="640" y="170" width="68" height="24" rx="4" fill="#fee2e2" stroke="#dc2626" stroke-width="1"/>
  <text x="674" y="187" text-anchor="middle" font-size="11" font-weight="600" fill="#991b1b">BLOCK</text>

  <!-- Lower-bound interpretation — PASS -->
  <rect x="410" y="240" width="310" height="70" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="425" y="260" font-size="11" font-weight="600" fill="#92400e">Lower-bound: "two" true iff count ≥ 2</text>
  <text x="425" y="278" font-size="10" fill="#d97706">s2: count ≥ 2 → true, s3: count ≥ 2 → true</text>
  <text x="425" y="294" font-size="10" fill="#d97706">All believed worlds satisfy "two"</text>
  <rect x="640" y="252" width="68" height="24" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="674" y="269" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">PASS</text>

  <!-- Result -->
  <rect x="410" y="325" width="310" height="58" rx="6" fill="#fffbeb" stroke="#d97706" stroke-width="1.5"/>
  <text x="565" y="347" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">Only lower-bound survives → forced selection</text>
  <text x="565" y="365" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">→ Lower-bound reading: P(s3) = 3/4</text>

  <!-- Arrow showing forced selection -->
  <text x="565" y="405" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">P(exact) = 0 — categorically excluded</text>

  <!-- Bottom summary -->
  <text x="380" y="454" text-anchor="middle" font-size="11" fill="#475569">The quality filter does double duty: it enforces Gricean Quality and selects between grammatical interpretations.</text>
</svg>
